[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "SBITB150626"
version = "0.1.0"
description = "Options Trading and Risk Management System"
authors = [
    {name = "nvmvl-KP", email = "example@example.com"},
]
readme = "README.md"
requires-python = ">=3.10"
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
]

[project.urls]
"Homepage" = "https://github.com/npmvlKP/SBITB150626"
"Repository" = "https://github.com/npmvlKP/SBITB150626"

[tool.merge-formatting]
include_layout = ["ruff"]
format = "black"

[tool.setuptools.packages.find]
exclude = [
    "deployment*",
    "config*",
    "backups*",
    "SBITB-150626-Plan*",
    "tests*",
    "verify*",
]
where = ["src"]

[tool.setuptools.dynamic]
dependencies = {file = ["requirements.txt"]}

[tool.ruff]
line-length = 120
target-version = "py310"

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # Pyflakes
    "W",   # pycodestyle warnings
    "B",   # Bugbear
    "I",   # isort
    "ICN", # Import Conventions
    "C4",  # Commas
    "UP",  # Pyupgrade
    "Q",   # Flake8-quotes
    "B9",  # Bugbear - function calls
]
ignore = [
    "E501", # Line too long (handled by line-length)
    "B905", # zip() without an explicit strict= parameter
]

[tool.ruff.lint.pycodestyle]
ignore-overlong-task-comments = true

[tool.ruff.lint.flake8-quotes]
inline-quotes = "double"

[tool.ruff.lint.per-file-ignores]
"src/risk/*.py" = ["B006", "UP", "Q000", "B905"]
"tests/**/*.py" = ["T20"]
"verify_*.py" = ["S607"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.pytest.ini_options]
asyncio_default_fixture_loop_scope = "function"

[tool.pyright]
include = ["src", "tests"]
exclude = ["**/node_modules", "**/ Венет1яяся"]
typeCheckingMode = "basic"

[tool.bandit]
exclude_dirs = ["tests", "verify_*", "backups"]
skips = ["B603", "B607", "B303", "B501", "B701"]
skips_regex = [
    "verify_",
    "\\btest\\b",
    "\\bexecut",
    "\\bconfig",
    "\\bbackups",
]
targets = ["src", ".", "config/settings.py"]