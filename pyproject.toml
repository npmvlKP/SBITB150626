[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[tool.ruff]
line-length = 120
target-version = "py310"

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # Pyflakes
    "W",   # pycodestyle warnings
    "B",   # Bugbear
    "I",   # isort
    "ICN", # Import Conventions
    "C4",  # Commas
    "UP",  # Pyupgrade
    "Q",   # Flake8-quotes
    "B9",  # Bugbear - function calls
]
ignore = [
    "E501", # Line too long (handled by line-length)
    "B905", # zip() without an explicit strict= parameter
]

[tool.ruff.lint.pycodestyle]
ignore-overlong-task-comments = true

[tool.ruff.lint.flake8-quotes]
quotes = "double"

[tool.ruff.lint.per-file-ignores]
"src/risk/*.py" = ["B006", "UP", "Q000", "B905"]
"tests/**/*.py" = ["T20"]
"verify_*.py" = ["S607", "B603"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.pyright]
include = ["src", "tests"]
exclude = ["**/node_modules", "**/ Venet1anся"]
typeCheckingMode = "basic"

[tool.bandit]
exclude_dirs = ["tests", "verify_*", "backups"]
skips = ["B603", "B607", "B303", "B501", "B701"]
skips_regex = [
    "verify_",
    "\\btest\\b",
    "\\bexecut",
    "\\bconfig",
    "\\bbackups",
]
targets = ["src", ".", "config/settings.py"]
