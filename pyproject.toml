[project]
name = "SBITB150626"
version = "0.1.0"
description = "SEBI-compliant Indian algorithmic trading bot for NSE + MCX"
requires-python = ">=3.11"
dependencies = [
    "kiteconnect>=5.0",
    "pandas>=2.1",
    "numpy>=1.26",
    "structlog>=23.2",
    "pydantic>=2.5",
    "pydantic-settings>=2.1",
    "httpx>=0.25",
    "redis>=5.0",
    "psycopg[binary]>=3.1",
    "vollib>=0.1",
    "QuantLib>=1.32",
    "cryptography>=41.0",
    "apscheduler>=3.10",
    "python-telegram-bot>=20.7",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-cov>=4.1",
    "pytest-mock>=3.12",
    "pytest-xdist>=3.5",
    "pytest-timeout>=2.2",
    "pytest-randomly>=3.15",
    "mypy>=1.8",
    "ruff>=0.5",
    "bandit[toml]>=1.7",
    "pip-audit>=0.7",
    "safety>=3.0",
    "pre-commit>=3.6",
    "vulture>=2.11",
    "pydocstyle>=6.3",
    "debugpy>=1.8",
    "rich>=13.7",
]

[tool.ruff]
target-version = "py311"
line-length = 120
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "A", "C4", "SIM", "TCH", "RUF"]
ignore = ["E501"]

[tool.ruff.lint.isort]
known-first-party = ["src", "config"]

[tool.ruff.format]
quote-style = "double"

[tool.mypy]
python_version = "3.11"
strict = true
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_any_generics = true
plugins = ["pydantic.mypy"]

[[tool.mypy.overrides]]
module = ["kiteconnect.*", "vollib.*", "QuantLib.*"]
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short --strict-markers"
markers = [
    "slow: slow tests",
    "integration: requires broker API connection",
    "paper_trade: paper trading mode tests",
]
filterwarnings = [
    "ignore::DeprecationWarning",
    "ignore::pytest.PytestDeprecationWarning",
    "ignore::pluggy.PluggyTeardownRaisedWarning",
]

[tool.coverage.run]
source = ["src"]
branch = true
omit = ["tests/*"]

[tool.coverage.report]
fail_under = 80
show_missing = true

[tool.bandit]
targets = ["src"]
skips = ["B101"]

[tool.vulture]
min_confidence = 80
paths = ["src", "tests"]

[tool.pydocstyle]
convention = "google"
add-ignore = ["D100", "D104", "D105", "D107"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src", "config"]