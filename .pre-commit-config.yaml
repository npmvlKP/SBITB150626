repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: detect-private-key
      # - id: no-commit-to-branch  # Temporarily disabled for development
      #   args: ['--branch', 'main']

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.17
    hooks:
      - id: ruff
        args: ['--fix', '--exit-non-zero-on-fix']
      - id: ruff-format

  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.9
    hooks:
      - id: bandit
        args: ['-c', '.bandit.yaml']
        additional_dependencies: ['bandit[toml]']

  # gitleaks skipped - use standalone gitleaks to avoid Go environment issues on Windows
  # Run `gitleaks detect --source .` manually or via verify_15_tools.ps1
  # - repo: https://github.com/gitleaks/gitleaks
  #   rev: v8.18.4
  #   hooks:
  #     - id: gitleaks

  # NOTE: docformatter removed - requires python_venv which is not supported
  # Use manual docformatter if needed: pip install docformatter && docformatter --in-place --style google
