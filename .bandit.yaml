# Bandit configuration file
# This file configures bandit security scanner behavior

# General settings
exclude_dirs:
  - backups
  - config/secrets.env.example
  - tests
  - deployment

# Skip tests for specific rules
tests:
  B108:  # hardcoded_temp_credentials
    skip_on_text:
      - "tests/disabled_alerts/BAN0101-no-discards-used-token.yaml"
    config:
      samples: true

# Exemptions for quantified
skip:
  - B105  # hardcoded_password_string - Acceptable false positives (status constants like PASS="pass")
  - B106  # hardcoded_password_funcarg - Acceptable false positives (test health check default password)
