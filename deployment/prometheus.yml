global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'trading-bot-monitor'

rule_files:
  - "/etc/prometheus/alert.rules"

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['host.docker.internal:9093'] # TODO: Add Alertmanager

scrape_configs:
  - job_name: 'trading_bot'
    static_configs:
      - targets: ['host.docker.internal:8000']
    scrape_interval: 10s
    scrape_timeout: 5s
    metrics_path: /metrics

  - job_name: 'timescaledb'
    static_configs:
      - targets: ['timescaledb:9187'] # TimescaleDB metrics exporter

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:9121'] # Redis metrics exporter

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'docker'
    static_configs:
      - targets: ['host.docker.internal:9323'] # Docker daemon metrics
