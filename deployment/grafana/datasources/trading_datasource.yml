apiVersion: 1

deleteDatasources:
  - name: Prometheus-Trading
    orgId: 1
  - name: Redis-Trading

datasources:
  - name: Prometheus-Trading
    type: prometheus
    url: http://prometheus:9090
    access: proxy
    orgId: 1
    basicAuth: false
    isDefault: true
    editable: true
    jsonData:
      timeInterval: "5s"
      alertmanagerUid: "alertmanager"

  - name: Timescale-Trading
    type: postgres
    url: timescaledb:5432
    database: trading_bot
    user: trading
    secureJsonData:
      password: "${TIMESCALEDB_PASSWORD}"
    jsonData:
      sslmode: "disable"
      postgresVersion: 1500
      timescaledb: true

  - name: Redis-Trading
    type: redis-datasource
    url: redis://redis:6379
    database: 0
    secureJsonData:
      password: "${REDIS_PASSWORD}"
    jsonData:
      client: standalone
      poolSize: 5
      timeout: 10
